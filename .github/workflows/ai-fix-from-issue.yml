# Triggered when a GitHub issue is opened, gets the ai-fix label, someone comments !fix, or dispatched directly with an issue number.

name: AI Fix from GitHub Issue

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub issue number to fix'
        required: true

concurrency:
  group: ai-fix-issue-${{ github.event.inputs.issue_number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  ai-fix:
    runs-on: ubuntu-latest

    # Run when:
    #   • Dispatched directly with an issue number, OR
    #   • An issue is opened, OR
    #   • An issue was labeled with "ai-fix", OR
    #   • A comment starts with "!fix" on a real issue (not a PR)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.action == 'opened') ||
      (github.event_name == 'issues' && github.event.label.name == 'ai-fix') ||
      (github.event_name == 'issue_comment' &&
       startsWith(github.event.comment.body, '!fix') &&
       github.event.issue.pull_request == '')

    permissions:
      contents: write
      issues: write
      pull-requests: write
      models: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Resolve issue number and title
        id: resolve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NUMBER="${{ github.event.inputs.issue_number }}"
          else
            NUMBER="${{ github.event.issue.number }}"
          fi

          TITLE=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${NUMBER}" \
            | jq -r '.title // "Untitled"')

          echo "number=$NUMBER" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Acknowledge trigger (add 👀 reaction)
        if: github.event_name == 'issue_comment'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -d '{"content":"eyes"}' > /dev/null

      - name: Build Copilot prompt from GitHub issue
        id: build_prompt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ steps.resolve.outputs.number }}"

          # Fetch full issue details
          ISSUE_JSON=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${ISSUE_NUMBER}")

          ISSUE_TITLE=$(echo "$ISSUE_JSON" | jq -r '.title // "Untitled"')
          ISSUE_BODY=$(echo "$ISSUE_JSON"  | jq -r '.body  // "No description."')

          # Build repository file tree
          FILE_TREE=$(git ls-files \
            | grep -E '\.(ts|tsx|js|jsx|css|scss|html|json)$' \
            | sort | head -100)

          # Embed COMPLETE source file contents so AI has full context
          true > /tmp/file_contents.txt
          for file in $(git ls-files | grep -E '\.(ts|tsx|js|jsx|css|scss)$' | head -30); do
            [ -f "$file" ] || continue
            printf '### FILE: %s\n```\n' "$file" >> /tmp/file_contents.txt
            cat "$file"                          >> /tmp/file_contents.txt
            printf '\n```\n\n'                   >> /tmp/file_contents.txt
          done

          FILE_CONTENTS=$(cat /tmp/file_contents.txt)

          {
            echo "You are an expert software engineer. Your task is to write code changes that fix a Jira issue."
            echo ""
            echo "Repository: ${{ github.repository }}"
            echo "Jira/GitHub Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}"
            echo ""
            echo "## Issue Description"
            echo "${ISSUE_BODY}"
            echo ""
            echo "## Repository File Tree"
            printf '```\n%s\n```\n' "${FILE_TREE}"
            echo ""
            echo "## Current Source Files (COMPLETE contents)"
            echo "${FILE_CONTENTS}"
            echo ""
            echo "## Your Task"
            echo "Write the actual code changes needed to fix the issue described above."
            echo "- Preserve ALL existing functionality — do not remove or break any existing features."
            echo "- Only add or modify what is needed to implement the fix."
            echo "- Follow the existing code style and naming conventions."
            echo "- If you create a new component, also import and use it in the relevant parent file."
            echo ""
            echo "## REQUIRED OUTPUT FORMAT"
            echo "Respond with ONLY a JSON object — no explanation, no markdown fences around the JSON itself:"
            echo ""
            echo '{"files": [{"path": "frontend/src/App.tsx", "content": "// full file content here"}, {"path": "frontend/src/App.css", "content": "/* full file content */"}]}'
            echo ""
            echo "Rules for the JSON:"
            echo "- 'path': relative path from repo root (e.g. frontend/src/App.tsx)"
            echo "- 'content': the COMPLETE updated file — not a diff, not a snippet, the whole file"
            echo "- Only include files you actually changed"
            echo "- Output nothing before or after the JSON object"
          } > copilot-prompt.txt

          echo "Prompt written ($(wc -l < copilot-prompt.txt) lines)"

      - name: Cache Copilot CLI
        uses: actions/cache@v4
        id: cache-copilot
        with:
          path: ~/.local/bin
          key: copilot-cli-${{ runner.os }}

      - name: Install Copilot CLI
        if: steps.cache-copilot.outputs.cache-hit != 'true'
        run: curl -fsSL https://gh.io/copilot-install | bash

      - name: Add Copilot CLI to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run Copilot and capture output
        id: ai_fix
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
        run: |
          copilot -p "$(cat copilot-prompt.txt)" \
            --model gpt-4.1 \
            --no-ask-user \
            2>&1 | tee /tmp/copilot-output.log

          if [ "${PIPESTATUS[0]}" -ne 0 ]; then
            echo "::error::Copilot CLI failed — check COPILOT_PAT secret and CLI flags"
            exit 1
          fi

          echo "=== Raw Copilot output ==="
          cat /tmp/copilot-output.log

      - name: Apply AI-generated file changes
        id: apply_changes
        run: |
          python3 - <<'PYEOF'
          import json, re, os, sys

          raw = open("/tmp/copilot-output.log").read()

          # Try to extract JSON — look for the outermost {...} containing "files"
          match = re.search(r'\{[\s\S]*"files"[\s\S]*\}', raw)
          if not match:
              print("No JSON file changes found in Copilot output.")
              print("--- Copilot output ---")
              print(raw[:2000])
              sys.exit(0)

          try:
              data = json.loads(match.group(0))
          except json.JSONDecodeError as e:
              print(f"JSON parse error: {e}")
              print("Trying to salvage partial JSON...")
              # Attempt to find the last complete file entry
              partial = match.group(0)
              # Truncate at last complete entry
              last = partial.rfind('},')
              if last != -1:
                  partial = partial[:last+1] + ']}'
                  try:
                      data = json.loads('{"files": [' + partial.split('"files": [', 1)[1])
                  except Exception:
                      print("Could not salvage JSON, skipping.")
                      sys.exit(0)
              else:
                  sys.exit(0)

          files = data.get("files", [])
          if not files:
              print("JSON parsed but no files listed.")
              sys.exit(0)

          written = []
          for entry in files:
              path = entry.get("path", "").strip()
              content = entry.get("content", "")
              if not path:
                  continue
              os.makedirs(os.path.dirname(path) if os.path.dirname(path) else ".", exist_ok=True)
              with open(path, "w") as f:
                  f.write(content)
              written.append(path)
              print(f"Wrote: {path}")

          # Save summary for PR body
          summary = "AI applied changes to: " + ", ".join(written) if written else "No files written."
          open("/tmp/ai_analysis.txt", "w").write(summary)
          print(f"\nTotal files written: {len(written)}")
          PYEOF

      - name: Check for changes
        id: check_changes
        run: |
          # Remove the prompt file so it never ends up in the PR
          rm -f copilot-prompt.txt

          UNTRACKED=$(git ls-files --others --exclude-standard)
          if git diff --quiet && git diff --staged --quiet && [ -z "$UNTRACKED" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No file changes produced"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "=== Modified files ==="
            git diff --name-only
            echo "=== Untracked files ==="
            echo "$UNTRACKED"
          fi

      - name: Create pull request with AI fixes
        if: steps.check_changes.outputs.has_changes == 'true'
        id: create_pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.resolve.outputs.number }}
          ISSUE_TITLE: ${{ steps.resolve.outputs.title }}
          JIRA_DOMAIN: ${{ vars.JIRA_DOMAIN }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
        run: |
          PR_BODY_PY='
          import json, os, subprocess

          issue_num = os.environ["ISSUE_NUMBER"]
          jira_key = os.environ.get("JIRA_KEY", "")
          jira_domain = os.environ.get("JIRA_DOMAIN", "").rstrip("/")
          ai_label = "GitHub Copilot (gpt-4.1)"
          analysis = open("/tmp/ai_analysis.txt").read() \
                     if os.path.exists("/tmp/ai_analysis.txt") else "AI-generated fix"

          changed = subprocess.run(
              ["git", "diff", "--name-only", "HEAD~1"],
              capture_output=True, text=True
          ).stdout.strip().split("\n")

          jira_line = ""
          if jira_key and jira_domain:
              jira_url = f"https://{jira_domain}/browse/{jira_key}"
              jira_line = f"**Jira:** [{jira_key}]({jira_url})"
          elif jira_key:
              jira_line = f"**Jira:** {jira_key}"

          lines = [
              "## 🤖 AI-Generated Fix",
              "",
              f"**GitHub issue:** #{issue_num}",
              f"**AI provider:** {ai_label}",
          ]
          if jira_line:
              lines.append(jira_line)
          lines += [
              "",
              "### Analysis",
              analysis,
              "",
              "### Changed Files",
          ]
          for f in changed:
              if f: lines.append(f"- `{f}`")

          lines += [
              "",
              "---",
              f"Fixes #{issue_num}",
          ]
          if jira_key:
              lines.append(f"<!-- jira-key: {jira_key} -->")

          print("\n".join(lines))
          '

          git config --global user.name "AI Issue Fixer"
          git config --global user.email "ai-fixer@github.com"

          # Read the Jira key from the issue body
          ISSUE_BODY=$(curl -s \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${ISSUE_NUMBER}" \
            | jq -r '.body // ""')
          JIRA_KEY=$(echo "$ISSUE_BODY" | grep -oP '(?<=<!-- jira-key: )[A-Z]+-[0-9]+(?= -->)' || true)

          # Create a timestamped branch
          TIMESTAMP=$(date '+%Y%m%d_%H%M%S')
          BRANCH="ai-fix/issue-${ISSUE_NUMBER}-${TIMESTAMP}"
          git checkout -b "$BRANCH"

          git add -A

          # Commit — include "Fixes #N" so GitHub auto-closes the issue on merge
          ANALYSIS=$(cat /tmp/ai_analysis.txt 2>/dev/null || echo "AI-generated code changes")
          COMMIT_BODY="Fixes #${ISSUE_NUMBER}"
          [ -n "$JIRA_KEY" ] && COMMIT_BODY=$(printf '%s\nJira: %s' "$COMMIT_BODY" "$JIRA_KEY")
          COMMIT_MSG=$(printf 'fix: AI-generated fix for issue #%s\n\n%s\n\n%s' \
            "$ISSUE_NUMBER" "$ANALYSIS" "$COMMIT_BODY")
          git commit -m "$COMMIT_MSG"

          git push origin "$BRANCH"

          # Build PR title
          if [ -n "$JIRA_KEY" ]; then
            PR_TITLE="[${JIRA_KEY}] ${ISSUE_TITLE} (Closes #${ISSUE_NUMBER})"
          else
            PR_TITLE="[AI Fix] ${ISSUE_TITLE} (Closes #${ISSUE_NUMBER})"
          fi

          # Build PR body — embed the Jira key so close-on-merge.yml can find it
          PR_BODY=$(ISSUE_NUMBER="$ISSUE_NUMBER" JIRA_KEY="$JIRA_KEY" JIRA_DOMAIN="$JIRA_DOMAIN" AI_PROVIDER="$AI_PROVIDER" python3 -c "$PR_BODY_PY")

          PR_BODY_JSON=$(echo "$PR_BODY" | python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))")
          PR_TITLE_JSON=$(echo "$PR_TITLE" | python3 -c "import json,sys; print(json.dumps(sys.stdin.read().strip()))")

          PR_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls" \
            -d "{\"title\": ${PR_TITLE_JSON}, \"body\": ${PR_BODY_JSON}, \"head\": \"${BRANCH}\", \"base\": \"main\"}")

          PR_NUMBER=$(echo "$PR_RESPONSE" | jq -r '.number // empty')
          PR_URL=$(echo "$PR_RESPONSE" | jq -r '.html_url // empty')

          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "✅ PR #${PR_NUMBER} created: $PR_URL"

      - name: Comment on issue with PR link
        if: steps.create_pr.outputs.pr_number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ANALYSIS=$(cat /tmp/ai_analysis.txt 2>/dev/null || echo "See PR for details.")
          COMMENT=$(printf '🤖 **AI Fix Generated**\n\n**Analysis:** %s\n\n**Pull Request:** %s\n\nOnce merged, this GitHub issue and the linked Jira issue will be automatically closed.' \
            "$ANALYSIS" \
            "${{ steps.create_pr.outputs.pr_url }}")

          COMMENT_JSON=$(echo "$COMMENT" | python3 -c "import json,sys; print(json.dumps({'body': sys.stdin.read()}))")

          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.resolve.outputs.number }}/comments" \
            -d "$COMMENT_JSON"

      - name: Comment when no changes were produced
        if: steps.check_changes.outputs.has_changes == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ steps.resolve.outputs.number }}/comments" \
            -d '{"body":"🤖 **AI Analysis Complete** — No code changes were identified for this issue. Provide more detail or use `!fix <extra context>` to give the AI more guidance."}'
